name: bull-ts
description: Embedded time-series storage engine. Write and query timestamped metric data with labels.
binary: bull
prefix: ts

global_flags:
  --data-dir <path>: Override data directory (default: ./data). Applied to root command.

triggers:
  - when: Need to record timestamped metrics locally (CPU, memory, request counts, latency, etc.)
  - when: Need to query time-series data within a time range
  - when: Need to bulk-import time-series data from NDJSON files
  - when: Need lightweight local observability without external TSDB
  - when: Need to track numeric values over time with label dimensions

notes: |
  Timestamps are unix seconds. The query command defaults to the last 1 hour if --from/--to are omitted.

commands:
  - name: write
    usage: bull ts write <db> <metric> <value> [--time <unix>] [--label key=value ...]
    description: Write a single data point. Timestamp defaults to now.
    output: (none on success)
    example: bull ts write monitoring cpu_usage 75.5 --label host=server1 --label region=us-east

  - name: bulk
    usage: bull ts bulk <db> <ndjson-file>
    description: Bulk write data points from NDJSON.
    output: "\"wrote N data points\""
    input_format: "One JSON per line: {\"metric\":\"name\",\"value\":N,\"timestamp\":T,\"labels\":{\"k\":\"v\"}}"
    example: bull ts bulk monitoring metrics.ndjson

  - name: query
    usage: bull ts query <db> <metric> [--from <unix>] [--to <unix>] [--label key=value ...] [--format table|csv|json]
    description: Query data points within a time range. Defaults to last 1 hour if --from/--to omitted.
    output: |
      --format table (default): Two-column table (TIMESTAMP, VALUE).
      --format csv: "timestamp,value" header then rows.
      --format json: JSON array of {"timestamp":N,"value":N}.
    example: bull ts query monitoring cpu_usage --from 1700000000 --to 1700003600 --label host=server1 --format json

  - name: latest
    usage: bull ts latest <db> <metric> [--label key=value ...] [--format table|json]
    description: Get the most recent data point for a metric.
    output: |
      --format table (default): "timestamp: N\nvalue: N"
      --format json: {"timestamp":N,"value":N}
    example: bull ts latest monitoring cpu_usage --label host=server1

  - name: count
    usage: bull ts count <db> <metric> [--from <unix>] [--to <unix>] [--label key=value ...]
    description: Count data points in a time range. Defaults to last 1 hour.
    output: Single integer on a line.
    example: bull ts count monitoring cpu_usage

  - name: export
    usage: bull ts export <db> <metric> [--from <unix>] [--to <unix>] [--label key=value ...] [-o <file>]
    description: Export data points as CSV. Defaults to last 1 hour.
    output: "CSV: timestamp,value header then rows."
    example: bull ts export monitoring cpu_usage -o metrics.csv

  - name: drop
    usage: bull ts drop <db>
    description: Delete a time-series database directory.
    output: "\"dropped <db>\""

  - name: dbs
    usage: bull ts dbs
    description: List all time-series databases.
    output: One database name per line.
