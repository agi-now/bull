name: bull-sql
description: Embedded SQLite database engine (pure Go, no CGo). Full SQL support with import/export.
binary: bull
prefix: sql

global_flags:
  --data-dir <path>: Override data directory (default: ./data). Applied to root command.

triggers:
  - when: Need to run SQL queries on local structured data
  - when: Need to import CSV/JSON files into a relational table for analysis
  - when: Need to create temporary tables and join data from multiple sources
  - when: Need to quickly inspect table schema or row counts
  - when: Need to execute a batch of SQL statements from a file
  - when: Need to transform or aggregate data with GROUP BY, JOIN, etc.

commands:
  - name: exec
    usage: bull sql exec <db> <sql>
    description: Execute a DDL/DML statement (CREATE, INSERT, UPDATE, DELETE).
    output: "\"N rows affected\""
    example: bull sql exec mydb "CREATE TABLE users (id INTEGER PRIMARY KEY, name TEXT, age INTEGER)"

  - name: query
    usage: bull sql query <db> <sql> [--format table|csv|json] [--limit N]
    description: Run a SELECT query and display results. --limit wraps query in a sub-select.
    output: |
      --format table (default): ASCII table with headers and borders.
      --format csv: CSV with header row.
      --format json: JSON array of objects [{column:value},...].
    example: bull sql query mydb "SELECT * FROM users WHERE age > 18" --format json --limit 100

  - name: exec-file
    usage: bull sql exec-file <db> <file.sql>
    description: Execute all SQL statements from a file.
    output: "\"ok\" on success."
    example: bull sql exec-file mydb migrations/001_init.sql

  - name: tables
    usage: bull sql tables <db>
    description: List all table names.
    output: One table name per line.

  - name: schema
    usage: bull sql schema <db> <table>
    description: Show the CREATE TABLE statement.
    output: The full CREATE TABLE DDL string.

  - name: count
    usage: bull sql count <db> <table>
    description: Count rows in a table.
    output: Single integer on a line.

  - name: import
    usage: bull sql import <db> <table> <file.csv>
    description: Import CSV data into a table (auto-creates if needed, all columns TEXT).
    output: "\"imported N rows\""

  - name: import-json
    usage: bull sql import-json <db> <table> <file.json>
    description: Import a JSON array of objects into a table (auto-creates if needed).
    output: "\"imported N rows\""
    input_format: "JSON array: [{\"col1\":\"val1\",\"col2\":\"val2\"},...]"

  - name: describe
    usage: bull sql describe <db> <table>
    description: Show column info via PRAGMA table_info.
    output: Tabular output with CID, NAME, TYPE, NOTNULL, DEFAULT, PK columns.
    example: bull sql describe mydb users

  - name: import-ndjson
    usage: bull sql import-ndjson <db> <table> <file.ndjson>
    description: Import NDJSON (one JSON object per line) into a table. Auto-creates if needed.
    output: "\"imported N rows\""
    input_format: "One JSON object per line: {\"col1\":\"val1\",\"col2\":\"val2\"}"

  - name: export
    usage: bull sql export <db> <sql> [-o <file>] [--format csv|json]
    description: Export query results to file (stdout or -o).
    output: |
      --format csv (default): CSV with header row.
      --format json: JSON array of objects.

  - name: shell
    usage: bull sql shell <db>
    description: Interactive SQL REPL with meta-commands.
    notes: |
      Meta-commands: .tables, .schema <table>, .count <table>, .quit/.exit.
      SELECT/PRAGMA/EXPLAIN auto-detected as queries; everything else as exec.

  - name: drop
    usage: bull sql drop <db>
    description: Delete a database file.
    output: "\"dropped <db>\""

  - name: dbs
    usage: bull sql dbs
    description: List all SQL databases.
    output: One database name per line (without .db extension).
