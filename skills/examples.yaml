name: bull-example-prompts
description: |
  Example user prompts that trigger bull skills.
  Each prompt maps to a skill, the commands to execute, and a brief rationale.

# ============================================================
#  KV — 8 prompts
# ============================================================
kv:
  - id: kv-01
    prompt: 帮我把这次爬虫的 cookie 存起来，key 用 session，值是 abc123xyz
    skill: kv
    commands:
      - bull kv put crawler session abc123xyz
    why: 简单的键值存储

  - id: kv-02
    prompt: 刚才存的 session cookie 是什么来着？帮我取一下
    skill: kv
    commands:
      - bull kv get crawler session
    why: 单 key 读取

  - id: kv-03
    prompt: 我需要一个计数器来追踪 API 调用次数，每调一次加 1
    skill: kv
    commands:
      - bull kv incr counters api_calls
    why: 原子递增计数

  - id: kv-04
    prompt: 看看 counters 这个库里目前有哪些 key，以 api_ 开头的列出来
    skill: kv
    commands:
      - bull kv list counters --prefix api_
    why: 前缀过滤列表

  - id: kv-05
    prompt: 检查一下 config 库里有没有 db_host 这个配置项
    skill: kv
    commands:
      - bull kv exists config db_host
    why: 键存在性检查

  - id: kv-06
    prompt: 把 cache 这个数据库里 sessions 这个 bucket 下的所有数据导出成 JSON
    skill: kv
    commands:
      - bull kv export cache --bucket sessions
    why: 按 bucket 导出 JSON

  - id: kv-07
    prompt: 我有一个 JSON 文件 backup.json，格式是 [{"key":"a","value":"1"}...]，帮我导入到 mydb
    skill: kv
    commands:
      - bull kv import mydb -f backup.json
    why: JSON 批量导入

  - id: kv-08
    prompt: 这个临时的 tmp 数据库不要了，帮我删掉
    skill: kv
    commands:
      - bull kv drop tmp
    why: 删除数据库

# ============================================================
#  SQL — 10 prompts
# ============================================================
sql:
  - id: sql-01
    prompt: 我有一个 users.csv 文件，帮我导入到数据库里，我想用 SQL 分析一下
    skill: sql
    commands:
      - bull sql import analytics users users.csv
    why: CSV 导入自动建表

  - id: sql-02
    prompt: 帮我查一下 users 表里年龄大于 30 的用户有多少个
    skill: sql
    commands:
      - bull sql query analytics "SELECT COUNT(*) as cnt FROM users WHERE age > '30'" --format json
    why: SQL 条件聚合

  - id: sql-03
    prompt: 把 users 表按城市分组，统计每个城市的用户数，结果用 JSON 给我
    skill: sql
    commands:
      - bull sql query analytics "SELECT city, COUNT(*) as cnt FROM users GROUP BY city ORDER BY cnt DESC" --format json
    why: GROUP BY 聚合 + JSON 输出

  - id: sql-04
    prompt: 我从 API 拿到了一个 JSON 响应 response.json，里面是对象数组，帮我导入到 orders 表
    skill: sql
    commands:
      - bull sql import-json shop orders response.json
    why: JSON 数组导入

  - id: sql-05
    prompt: 帮我看看 analytics 数据库里都有哪些表
    skill: sql
    commands:
      - bull sql tables analytics
    why: 元数据查询

  - id: sql-06
    prompt: users 表的建表语句是什么？帮我看一下结构
    skill: sql
    commands:
      - bull sql schema analytics users
    why: 查看表结构

  - id: sql-07
    prompt: 我有两个 CSV——old_prices.csv 和 new_prices.csv，帮我找出涨价的商品
    skill: sql
    commands:
      - bull sql import compare old_prices old_prices.csv
      - bull sql import compare new_prices new_prices.csv
      - bull sql query compare "SELECT n.name, o.price as old_price, n.price as new_price FROM new_prices n JOIN old_prices o ON n.id=o.id WHERE CAST(n.price AS REAL) > CAST(o.price AS REAL)" --format json
    why: 多表 JOIN 比较

  - id: sql-08
    prompt: 把查询结果导出成 CSV 文件，查 orders 表 status 为 completed 的记录
    skill: sql
    commands:
      - bull sql export shop "SELECT * FROM orders WHERE status='completed'" -o completed.csv
    why: 查询结果导出 CSV 文件

  - id: sql-09
    prompt: 我写了个 init.sql 脚本，帮我在 mydb 上执行
    skill: sql
    commands:
      - bull sql exec-file mydb init.sql
    why: 批量执行 SQL 文件

  - id: sql-10
    prompt: orders 表目前有多少条记录？
    skill: sql
    commands:
      - bull sql count shop orders
    why: 快速行数统计

# ============================================================
#  Graph — 8 prompts
# ============================================================
graph:
  - id: graph-01
    prompt: 帮我建一个微服务依赖图，先加 auth-service、user-service、db-service 三个节点
    skill: graph
    commands:
      - bull graph add-vertex deps auth-service --attr type=service
      - bull graph add-vertex deps user-service --attr type=service
      - bull graph add-vertex deps db-service --attr type=database
    why: 批量添加带属性的节点

  - id: graph-02
    prompt: auth-service 依赖 user-service，user-service 依赖 db-service，帮我加上这两条边
    skill: graph
    commands:
      - bull graph add-edge deps auth-service user-service --weight 1
      - bull graph add-edge deps user-service db-service --weight 1
    why: 建立有向依赖关系

  - id: graph-03
    prompt: 从 auth-service 到 db-service 的最短路径是什么？
    skill: graph
    commands:
      - bull graph shortest-path deps auth-service db-service
    why: 最短路径查找

  - id: graph-04
    prompt: 我有一个 friends.csv 文件，每行是 "人A,人B"，帮我导入成无向社交图
    skill: graph
    commands:
      - bull graph import-csv social friends.csv --undirected
    why: CSV 批量导入无向图

  - id: graph-05
    prompt: 看看 user-service 直接依赖了哪些服务
    skill: graph
    commands:
      - bull graph neighbors deps user-service
    why: 查询直接邻居

  - id: graph-06
    prompt: 从 gateway 出发做一个广度优先遍历，看看能到达哪些服务
    skill: graph
    commands:
      - bull graph bfs deps gateway
    why: BFS 可达性分析

  - id: graph-07
    prompt: Alice 和 David 在社交网络里是否有间接联系？
    skill: graph
    commands:
      - bull graph has-path social Alice David --undirected
    why: 可达性判断

  - id: graph-08
    prompt: 这个依赖图有多少个节点和边？
    skill: graph
    commands:
      - bull graph stats deps
    why: 图规模统计

# ============================================================
#  Search — 8 prompts
# ============================================================
search:
  - id: search-01
    prompt: 我有一批文章数据 articles.ndjson，帮我建一个全文搜索索引
    skill: search
    commands:
      - bull search create articles
      - bull search bulk articles articles.ndjson
    why: 创建索引 + NDJSON 批量导入

  - id: search-02
    prompt: 在文章里搜索包含 "machine learning" 的内容，给我前 5 条
    skill: search
    commands:
      - bull search query articles "machine learning" --limit 5 --format json
    why: 全文搜索 + 限制数量

  - id: search-03
    prompt: 搜索标题里包含 "kubernetes" 的文章，把标题和作者字段也返回
    skill: search
    commands:
      - bull search query articles "title:kubernetes" --field title --field author --format json
    why: 字段级搜索 + 指定返回字段

  - id: search-04
    prompt: 帮我把 id 为 doc-42 的那篇文章从索引里删掉
    skill: search
    commands:
      - bull search delete articles doc-42
    why: 删除单个文档

  - id: search-05
    prompt: articles 索引目前有多少篇文档？
    skill: search
    commands:
      - bull search info articles
    why: 索引统计

  - id: search-06
    prompt: 帮我把 doc-1 这篇文章的完整内容取出来看看
    skill: search
    commands:
      - bull search get articles doc-1
    why: 按 ID 获取文档

  - id: search-07
    prompt: 我有一堆错误日志 errors.ndjson，帮我索引起来然后搜 "timeout" 和 "connection refused"
    skill: search
    commands:
      - bull search create error_logs
      - bull search bulk error_logs errors.ndjson
      - bull search query error_logs "+timeout +\"connection refused\"" --limit 10 --format json
    why: 日志索引 + 复合搜索

  - id: search-08
    prompt: 这个旧的 test_idx 索引不用了，删掉
    skill: search
    commands:
      - bull search drop test_idx
    why: 清理索引

# ============================================================
#  TS — 6 prompts
# ============================================================
ts:
  - id: ts-01
    prompt: 帮我记录一下当前服务器的 CPU 使用率是 72.5%，标签标上 host=web-01
    skill: ts
    commands:
      - bull ts write monitoring cpu_usage 72.5 --label host=web-01
    why: 写入单个指标点

  - id: ts-02
    prompt: 查一下最近一小时 web-01 的 CPU 使用率数据
    skill: ts
    commands:
      - bull ts query monitoring cpu_usage --label host=web-01 --format json
    why: 默认最近1小时查询

  - id: ts-03
    prompt: 我有一个 metrics.ndjson 文件，里面是批量指标数据，帮我导入到 monitoring 库
    skill: ts
    commands:
      - bull ts bulk monitoring metrics.ndjson
    why: NDJSON 批量导入

  - id: ts-04
    prompt: 查一下从 1700000000 到 1700003600 时间段内 memory_usage 的数据，用 CSV 格式给我
    skill: ts
    commands:
      - bull ts query monitoring memory_usage --from 1700000000 --to 1700003600 --format csv
    why: 精确时间范围查询 + CSV 输出

  - id: ts-05
    prompt: 目前有哪些时序数据库？列出来看看
    skill: ts
    commands:
      - bull ts dbs
    why: 列出所有 TS 库

  - id: ts-06
    prompt: monitoring 这个时序库太大了，清掉重来
    skill: ts
    commands:
      - bull ts drop monitoring
    why: 删除时序数据库

# ============================================================
#  跨 skill 组合场景 — 5 prompts
# ============================================================
combo:
  - id: combo-01
    prompt: 帮我分析一下 access.csv 里各个 URL 的访问量，同时把 top 10 的 URL 存到 KV 里方便后面快速查
    skills: [sql, kv]
    commands:
      - bull sql import analytics access access.csv
      - bull sql query analytics "SELECT url, COUNT(*) as cnt FROM access GROUP BY url ORDER BY cnt DESC LIMIT 10" --format json
      - bull kv put cache top_urls '<上一步的 JSON 结果>'
    why: SQL 聚合 + KV 缓存结果

  - id: combo-02
    prompt: 把 dependencies.csv 导入成图，然后找出从 frontend 到 database 的最短路径，结果存到 KV
    skills: [graph, kv]
    commands:
      - bull graph import-csv infra dependencies.csv
      - bull graph shortest-path infra frontend database
      - bull kv put results dep_path '<路径结果>'
    why: 图分析 + 结果持久化

  - id: combo-03
    prompt: 我在做 A/B 测试，每次实验记录一个指标到时序库，最后用 SQL 来对比两组数据
    skills: [ts, sql]
    commands:
      - bull ts write experiment conversion 0.15 --label group=A
      - bull ts write experiment conversion 0.18 --label group=B
      - bull ts query experiment conversion --format csv
    why: 时序记录 + 数据分析

  - id: combo-04
    prompt: 把产品目录 products.json 导入 SQL 表，同时建一个全文搜索索引方便按名称搜商品
    skills: [sql, search]
    commands:
      - bull sql import-json shop products products.json
      - bull search create products
      - bull search bulk products products.ndjson
    why: 结构化存储 + 全文搜索双引擎

  - id: combo-05
    prompt: 帮我把每一步的处理状态记到 KV 里，最后汇总所有步骤的状态报告
    skills: [kv]
    commands:
      - bull kv put pipeline step1 '{"status":"done","rows":1500}'
      - bull kv put pipeline step2 '{"status":"done","rows":1200}'
      - bull kv put pipeline step3 '{"status":"done","rows":800}'
      - bull kv list pipeline
    why: 多步骤状态追踪
